name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history is needed for changesets to detect what changed
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
        with:
          install: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (prod)
        run: pnpm build

      - name: Package
        run: pnpm package

      - name: Create release PR or publish release
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          # Run our version script so manifest.json stays in sync with package.json.
          version: pnpm run version
          # We don't publish to npm; use changeset tag to create git tags.
          publish: pnpm changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .mcpb asset to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILENAME: 'paprika-mcp-server'
          EXTENSION: 'mcpb'
          ARCH: 'arm64'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          VERSIONED_ARTIFACT="${FILENAME}-${TAG}"

          # Rename the artifact to include the version and architecture
          cp "$FILENAME.${EXTENSION}" "${VERSIONED_ARTIFACT}.${EXTENSION}"
          cp "$FILENAME.${EXTENSION}" "${VERSIONED_ARTIFACT}-${ARCH}.${EXTENSION}"

          gh release upload "${TAG}" "${FILENAME}.${EXTENSION}" --clobber
          gh release upload "${TAG}" "${VERSIONED_ARTIFACT}.${EXTENSION}" --clobber
          gh release upload "${TAG}" "${VERSIONED_ARTIFACT}-${ARCH}.${EXTENSION}" --clobber